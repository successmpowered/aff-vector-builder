<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Wallet Dashboard — Apex Fusion Foundation</title>
<style>
  :root {
    --bg:         #0a0c12;
    --surface:    #111520;
    --surface2:   #181d2e;
    --border:     #222840;
    --text:       #e2e6f0;
    --text-dim:   #7880a0;
    --accent:     #5b67f8;
    --accent2:    #818cf8;
    --gold:       #f4b942;
    --green:      #22d47a;
    --red:        #f05252;
    --blue:       #38bdf8;
    --radius:     10px;
    --font:       -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    --mono:       'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 60px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .nav-brand .logo {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    color: #fff;
  }

  .nav-links {
    display: flex;
    gap: 6px;
  }

  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.8rem;
    padding: 5px 12px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }

  .nav-links a:hover { background: var(--surface2); color: var(--text); }
  .nav-links a.active { background: var(--surface2); color: var(--accent2); }

  .nav-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    margin-right: 5px;
  }
  .status-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.err { background: var(--red); }

  /* ── CONTAINER ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 24px;
  }

  .page-header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .page-header p {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  /* ── ADD WALLET BAR ── */
  .add-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .add-bar input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-bar input:focus { border-color: var(--accent); }
  .add-bar input::placeholder { color: var(--text-dim); }

  .add-bar input.invalid { border-color: var(--red); }

  .add-bar .label-input {
    width: 160px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-bar .label-input:focus { border-color: var(--accent); }
  .add-bar .label-input::placeholder { color: var(--text-dim); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-danger:hover { background: var(--red); border-color: var(--red); }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }

  .summary-card .s-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .summary-card .s-value {
    font-size: 1.4rem;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: -0.02em;
  }

  .summary-card .s-sub {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .s-value.gold  { color: var(--gold); }
  .s-value.green { color: var(--green); }
  .s-value.blue  { color: var(--blue); }

  /* ── WALLET CARDS ── */
  .wallets-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .wallet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .wallet-card:hover { border-color: #333d60; }

  .wallet-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }

  .wallet-header:hover { background: rgba(255,255,255,0.02); }

  .wallet-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .wallet-info {
    flex: 1;
    min-width: 0;
  }

  .wallet-name {
    font-weight: 600;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wallet-addr {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .wallet-balance {
    text-align: right;
    flex-shrink: 0;
  }

  .wallet-balance .amount {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
  }

  .wallet-balance .sub {
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  .wallet-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .chevron {
    font-size: 12px;
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .chevron.open { transform: rotate(180deg); }

  /* ── WALLET DETAIL ── */
  .wallet-detail {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .wallet-detail.open { display: block; }

  .detail-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 18px;
  }

  .dtab {
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .dtab:hover { color: var(--text); }
  .dtab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  .dtab-panel { display: none; padding: 14px 18px 18px; }
  .dtab-panel.active { display: block; }

  /* ── UTXO TABLE ── */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  th {
    text-align: left;
    color: var(--text-dim);
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 9px 10px;
    border-bottom: 1px solid rgba(34,40,64,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  .mono { font-family: var(--mono); }

  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .tag.asset { color: var(--blue); border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.08); }
  .tag.lovelace { color: var(--gold); border-color: rgba(244,185,66,0.3); background: rgba(244,185,66,0.08); }

  .tx-in  { color: var(--green); }
  .tx-out { color: var(--red); }

  .copy-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 11px;
    opacity: 0.6;
    transition: opacity 0.15s;
  }
  .copy-btn:hover { opacity: 1; color: var(--accent2); }

  /* ── LOADING / EMPTY ── */
  .loading-msg, .empty-msg, .error-msg {
    text-align: center;
    padding: 28px;
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .error-msg { color: var(--red); }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BADGE ── */
  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 0.68rem;
    font-weight: 700;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .badge.loading { color: var(--text-dim); }
  .badge.ok      { color: var(--green); border-color: rgba(34,212,122,0.3); background: rgba(34,212,122,0.08); }
  .badge.warn    { color: var(--gold); border-color: rgba(244,185,66,0.3); background: rgba(244,185,66,0.08); }
  .badge.err     { color: var(--red); border-color: rgba(240,82,82,0.3); background: rgba(240,82,82,0.08); }

  /* ── EMPTY STATE ── */
  .empty-wallets {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-wallets .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-wallets h3 { color: var(--text); font-size: 1rem; margin-bottom: 8px; }
  .empty-wallets p { font-size: 0.85rem; max-width: 400px; margin: 0 auto; }

  /* ── REFRESH ── */
  .refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .refresh-bar span { display: flex; align-items: center; gap: 8px; }

  /* ── ASSET PILLS ── */
  .asset-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(56,189,248,0.08);
    border: 1px solid rgba(56,189,248,0.2);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.7rem;
    color: var(--blue);
    margin: 2px 2px 0 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .summary-strip { grid-template-columns: repeat(2, 1fr); }
    .add-bar { flex-wrap: wrap; }
    .add-bar .label-input { width: 100%; }
    nav { padding: 0 14px; }
    .container { padding: 16px 12px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="logo">V</div>
    Vector Testnet
  </div>
  <div class="nav-links">
    <a href="../explorer/index.html">Explorer</a>
    <a href="index.html" class="active">Wallets</a>
  </div>
  <div class="nav-meta">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">connecting…</span></span>
    <span id="lastRefresh">—</span>
  </div>
</nav>

<div class="container">

  <div class="page-header">
    <h1>Wallet Dashboard</h1>
    <p>Track Vector testnet wallet addresses, AP3X balances, and UTxOs.</p>
  </div>

  <!-- Add wallet -->
  <div class="add-bar">
    <input type="text" id="addrInput" placeholder="addr1… — paste a Vector address" autocomplete="off" spellcheck="false">
    <input type="text" id="labelInput" class="label-input" placeholder="Label (optional)">
    <button class="btn btn-primary" onclick="addWallet()">+ Add Wallet</button>
    <button class="btn" onclick="refreshAll()" title="Refresh all wallets">&#8635; Refresh</button>
  </div>

  <!-- Summary strip -->
  <div class="summary-strip">
    <div class="summary-card">
      <div class="s-label">Wallets Tracked</div>
      <div class="s-value blue" id="sumWallets">0</div>
      <div class="s-sub">addresses</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Total Balance</div>
      <div class="s-value gold" id="sumBalance">—</div>
      <div class="s-sub">AP3X</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Total UTxOs</div>
      <div class="s-value green" id="sumUtxos">—</div>
      <div class="s-sub">unspent outputs</div>
    </div>
    <div class="summary-card">
      <div class="s-label">Native Assets</div>
      <div class="s-value" id="sumAssets" style="color:var(--blue)">—</div>
      <div class="s-sub">unique tokens</div>
    </div>
  </div>

  <!-- Wallets list -->
  <div class="refresh-bar">
    <span id="refreshLabel">Auto-refresh: 30s</span>
    <span id="countdownLabel"></span>
  </div>

  <div id="walletsList" class="wallets-list"></div>

</div><!-- /container -->

<script>
const KOIOS = "https://koios.vector.testnet.apexfusion.org/api/v1";
const STORAGE_KEY = "vector_wallets_v1";

// ── State ──────────────────────────────────────────────────────
let wallets   = [];   // [{id, label, address, data, status}]
let countdown = 30;
let cdTimer   = null;

// ── Persistence ────────────────────────────────────────────────
function loadWallets() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) wallets = JSON.parse(raw);
  } catch (_) { wallets = []; }
}

function saveWallets() {
  const toSave = wallets.map(w => ({ id: w.id, label: w.label, address: w.address }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
}

// ── Helpers ────────────────────────────────────────────────────
function lovelaceToAp3x(lv) {
  return (Number(BigInt(lv || 0)) / 1_000_000);
}

function fmtAp3x(lv) {
  const ap = lovelaceToAp3x(lv);
  if (ap >= 1_000_000) return (ap / 1_000_000).toFixed(2) + "M";
  if (ap >= 1_000)     return (ap / 1_000).toFixed(2) + "K";
  return ap.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 });
}

function truncAddr(addr, start=14, end=8) {
  if (!addr) return "—";
  if (addr.length <= start + end + 3) return addr;
  return addr.slice(0, start) + "…" + addr.slice(-end);
}

function truncHash(h, s=10, e=8) {
  if (!h) return "—";
  return h.slice(0, s) + "…" + h.slice(-e);
}

function fmtTs(unix) {
  if (!unix) return "—";
  const d = new Date(unix * 1000);
  return d.toLocaleDateString("en-GB", {day:"2-digit",month:"short"})
    + " " + d.toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit"});
}

function copyToClipboard(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.textContent;
    el.textContent = "✓";
    setTimeout(() => { el.textContent = orig; }, 1200);
  });
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function walletEmoji(idx) {
  const e = ["💼","🏦","🔐","💎","⚡","🌐","🏛","🔑","💰","🛡"];
  return e[idx % e.length];
}

// ── API ────────────────────────────────────────────────────────
async function koiosGet(path) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(KOIOS + path, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  } catch (e) { clearTimeout(t); throw e; }
}

async function koiosPost(path, body) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(KOIOS + path, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
    clearTimeout(t);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  } catch (e) { clearTimeout(t); throw e; }
}

async function fetchWalletData(address) {
  const [utxos, txs] = await Promise.all([
    koiosPost("/address_utxos", { "_addresses": [address] }),
    koiosPost("/address_txs",   { "_addresses": [address] }).catch(() => []),
  ]);
  return { utxos: utxos || [], txs: txs || [] };
}

// ── Add / Remove ───────────────────────────────────────────────
function addWallet() {
  const addr  = document.getElementById("addrInput").value.trim();
  const label = document.getElementById("labelInput").value.trim();
  const input = document.getElementById("addrInput");

  if (!addr.startsWith("addr1") || addr.length < 50) {
    input.classList.add("invalid");
    input.focus();
    setTimeout(() => input.classList.remove("invalid"), 1500);
    return;
  }

  if (wallets.find(w => w.address === addr)) {
    input.classList.add("invalid");
    setTimeout(() => input.classList.remove("invalid"), 1500);
    return;
  }

  const w = {
    id: uid(),
    label: label || ("Wallet " + (wallets.length + 1)),
    address: addr,
    data: null,
    status: "loading",
  };

  wallets.push(w);
  saveWallets();
  document.getElementById("addrInput").value  = "";
  document.getElementById("labelInput").value = "";

  renderWallets();
  loadSingleWallet(w.id);
}

function removeWallet(id) {
  wallets = wallets.filter(w => w.id !== id);
  saveWallets();
  renderWallets();
  updateSummary();
}

// ── Load data ──────────────────────────────────────────────────
async function loadSingleWallet(id) {
  const w = wallets.find(x => x.id === id);
  if (!w) return;

  w.status = "loading";
  updateWalletCard(w);

  try {
    w.data   = await fetchWalletData(w.address);
    w.status = "ok";
  } catch (e) {
    w.status = "error";
    w.error  = e.message;
  }

  updateWalletCard(w);
  updateSummary();
}

async function refreshAll() {
  setStatus("ok", "refreshing…");
  await Promise.all(wallets.map(w => loadSingleWallet(w.id)));
  const now = new Date();
  document.getElementById("lastRefresh").textContent =
    "Updated " + now.toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  setStatus("ok", "Vector Testnet");
  resetCountdown();
}

// ── Summary ────────────────────────────────────────────────────
function updateSummary() {
  let totalLv  = 0n;
  let totalUtxo = 0;
  const assetSet = new Set();

  for (const w of wallets) {
    if (!w.data) continue;
    for (const u of w.data.utxos) {
      totalLv += BigInt(u.value || 0);
      totalUtxo++;
      for (const a of (u.asset_list || [])) {
        assetSet.add((a.policy_id || "") + (a.asset_name || ""));
      }
    }
  }

  document.getElementById("sumWallets").textContent  = wallets.length;
  document.getElementById("sumBalance").textContent  = wallets.length ? fmtAp3x(totalLv) : "—";
  document.getElementById("sumUtxos").textContent    = wallets.length ? totalUtxo : "—";
  document.getElementById("sumAssets").textContent   = wallets.length ? assetSet.size : "—";
}

// ── Render ─────────────────────────────────────────────────────
function renderWallets() {
  const el = document.getElementById("walletsList");

  if (wallets.length === 0) {
    el.innerHTML = `
      <div class="empty-wallets">
        <div class="icon">🔍</div>
        <h3>No wallets tracked yet</h3>
        <p>Paste a Vector testnet address above (starts with <code style="color:var(--accent2)">addr1</code>) to start monitoring it.</p>
      </div>`;
    updateSummary();
    return;
  }

  el.innerHTML = "";
  wallets.forEach((w, idx) => {
    const card = document.createElement("div");
    card.className = "wallet-card";
    card.id = "card-" + w.id;
    el.appendChild(card);
    renderCard(card, w, idx);
  });
}

function renderCard(card, w, idx) {
  const balance = w.data
    ? w.data.utxos.reduce((s, u) => s + BigInt(u.value || 0), 0n)
    : null;

  const utxoCount = w.data ? w.data.utxos.length : null;

  const statusBadge = w.status === "loading"
    ? `<span class="badge loading"><span class="spinner"></span>loading</span>`
    : w.status === "error"
    ? `<span class="badge err">error</span>`
    : `<span class="badge ok">live</span>`;

  card.innerHTML = `
    <div class="wallet-header" onclick="toggleDetail('${w.id}')">
      <div class="wallet-icon">${walletEmoji(idx)}</div>
      <div class="wallet-info">
        <div class="wallet-name">
          ${escHtml(w.label)}
          ${statusBadge}
        </div>
        <div class="wallet-addr" title="${w.address}">
          ${truncAddr(w.address)}
          <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard('${w.address}', this)" title="Copy address">⧉</button>
        </div>
      </div>
      <div class="wallet-balance">
        <div class="amount">${balance !== null ? fmtAp3x(balance) + " AP3X" : "—"}</div>
        <div class="sub">${utxoCount !== null ? utxoCount + " UTxO" + (utxoCount !== 1 ? "s" : "") : ""}</div>
      </div>
      <div class="wallet-actions">
        <button class="btn btn-danger" style="padding:5px 9px;font-size:0.75rem"
          onclick="event.stopPropagation(); removeWallet('${w.id}')" title="Remove wallet">✕</button>
      </div>
      <span class="chevron" id="chev-${w.id}">▼</span>
    </div>
    <div class="wallet-detail" id="detail-${w.id}">
      ${renderDetail(w)}
    </div>`;
}

function renderDetail(w) {
  if (w.status === "loading") {
    return `<div class="loading-msg"><span class="spinner"></span>Loading wallet data…</div>`;
  }
  if (w.status === "error") {
    return `<div class="error-msg">Failed to load: ${escHtml(w.error || "unknown error")}</div>`;
  }
  if (!w.data) return "";

  const { utxos, txs } = w.data;

  // Build UTxO rows
  let utxoRows = "";
  if (utxos.length === 0) {
    utxoRows = `<tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:20px">No UTxOs — wallet is empty</td></tr>`;
  } else {
    for (const u of utxos) {
      const assets = (u.asset_list || []);
      const assetPills = assets.map(a => {
        const name = a.asset_name
          ? (() => { try { return decodeURIComponent(escape(String.fromCharCode(...a.asset_name.match(/.{2}/g).map(h => parseInt(h,16))))); } catch(_){ return a.asset_name; } })()
          : (a.policy_id || "").slice(0,8) + "…";
        return `<span class="asset-pill" title="${a.policy_id}.${a.asset_name}">${escHtml(name)} <strong>${Number(a.quantity).toLocaleString()}</strong></span>`;
      }).join("");

      utxoRows += `
        <tr>
          <td class="mono" style="font-size:0.72rem">
            ${truncHash(u.tx_hash)}#${u.tx_index}
            <button class="copy-btn" onclick="copyToClipboard('${u.tx_hash}', this)" title="Copy tx hash">⧉</button>
          </td>
          <td><span class="tag lovelace">${fmtAp3x(u.value)} AP3X</span></td>
          <td>${assetPills || '<span style="color:var(--text-dim)">—</span>'}</td>
          <td class="mono" style="color:var(--text-dim);font-size:0.72rem">${u.block_height ? '#' + Number(u.block_height).toLocaleString() : '—'}</td>
        </tr>`;
    }
  }

  // Build TX rows
  let txRows = "";
  const txSlice = txs.slice(0, 20);
  if (txSlice.length === 0) {
    txRows = `<tr><td colspan="3" style="text-align:center;color:var(--text-dim);padding:20px">No transactions found</td></tr>`;
  } else {
    for (const tx of txSlice) {
      txRows += `
        <tr>
          <td class="mono" style="font-size:0.72rem">
            ${truncHash(tx.tx_hash)}
            <button class="copy-btn" onclick="copyToClipboard('${tx.tx_hash}', this)" title="Copy">⧉</button>
          </td>
          <td style="color:var(--text-dim);font-size:0.72rem">${fmtTs(tx.block_time)}</td>
          <td class="mono" style="color:var(--text-dim);font-size:0.72rem">${tx.block_height ? '#' + Number(tx.block_height).toLocaleString() : '—'}</td>
        </tr>`;
    }
  }

  return `
    <div class="detail-tabs">
      <div class="dtab active" onclick="switchTab(event,'${w.id}','utxos')">UTxOs (${utxos.length})</div>
      <div class="dtab" onclick="switchTab(event,'${w.id}','txs')">Transactions (${txSlice.length})</div>
      <div class="dtab" onclick="switchTab(event,'${w.id}','info')">Address Info</div>
    </div>
    <div id="tab-${w.id}-utxos" class="dtab-panel active">
      <table>
        <thead><tr><th>UTxO</th><th>AP3X</th><th>Assets</th><th>Block</th></tr></thead>
        <tbody>${utxoRows}</tbody>
      </table>
    </div>
    <div id="tab-${w.id}-txs" class="dtab-panel">
      <table>
        <thead><tr><th>Tx Hash</th><th>Time</th><th>Block</th></tr></thead>
        <tbody>${txRows}</tbody>
      </table>
    </div>
    <div id="tab-${w.id}-info" class="dtab-panel">
      <table>
        <tbody>
          <tr><td style="color:var(--text-dim);width:140px">Full Address</td>
            <td class="mono" style="font-size:0.72rem;word-break:break-all">${escHtml(w.address)}
              <button class="copy-btn" onclick="copyToClipboard('${w.address}',this)">⧉</button></td></tr>
          <tr><td style="color:var(--text-dim)">Balance</td>
            <td class="mono">${fmtAp3x(utxos.reduce((s,u)=>s+BigInt(u.value||0),0n))} AP3X</td></tr>
          <tr><td style="color:var(--text-dim)">UTxO Count</td>
            <td>${utxos.length}</td></tr>
          <tr><td style="color:var(--text-dim)">Tx Count</td>
            <td>${txs.length}</td></tr>
        </tbody>
      </table>
    </div>`;
}

function updateWalletCard(w) {
  const card = document.getElementById("card-" + w.id);
  if (!card) return;
  const idx = wallets.findIndex(x => x.id === w.id);
  renderCard(card, w, idx);

  // Re-open detail if it was open
  const detail = document.getElementById("detail-" + w.id);
  const chev   = document.getElementById("chev-" + w.id);
  if (detail && card.dataset.open === "1") {
    detail.classList.add("open");
    if (chev) chev.classList.add("open");
  }
}

function toggleDetail(id) {
  const detail = document.getElementById("detail-" + id);
  const chev   = document.getElementById("chev-" + id);
  const card   = document.getElementById("card-" + id);
  if (!detail) return;
  const isOpen = detail.classList.toggle("open");
  if (chev) chev.classList.toggle("open", isOpen);
  if (card) card.dataset.open = isOpen ? "1" : "0";
}

function switchTab(e, wid, tab) {
  e.stopPropagation();
  const detail = document.getElementById("detail-" + wid);
  if (!detail) return;
  detail.querySelectorAll(".dtab").forEach(t => t.classList.remove("active"));
  detail.querySelectorAll(".dtab-panel").forEach(p => p.classList.remove("active"));
  e.target.classList.add("active");
  const panel = document.getElementById("tab-" + wid + "-" + tab);
  if (panel) panel.classList.add("active");
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

// ── Status ─────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById("statusDot");
  dot.className = "status-dot " + (state === "ok" ? "ok" : "err");
  document.getElementById("statusText").textContent = text;
}

// ── Countdown ──────────────────────────────────────────────────
function resetCountdown() {
  countdown = 30;
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    countdown--;
    document.getElementById("countdownLabel").textContent = countdown > 0 ? `Next refresh in ${countdown}s` : "";
    if (countdown <= 0) refreshAll();
  }, 1000);
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  loadWallets();

  // Restore data fields
  wallets = wallets.map(w => ({ ...w, data: null, status: "loading" }));

  renderWallets();
  updateSummary();

  // Check API
  try {
    await koiosGet("/tip");
    setStatus("ok", "Vector Testnet");
  } catch (e) {
    setStatus("err", "API unreachable");
  }

  // Load all wallets
  if (wallets.length > 0) {
    await refreshAll();
  }

  resetCountdown();
}

// Enter key in address box
document.getElementById("addrInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addWallet();
});

init();
</script>
</body>
</html>
